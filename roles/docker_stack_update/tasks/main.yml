---
- name: Run common stack prechecks
  ansible.builtin.include_role:
    name: common_prechecks

- name: Resolve stack project directory
  ansible.builtin.set_fact:
    stack_project_dir: "{{ stack.path | default(stack.project_dir) }}"
    stack_execute_host: "{{ stack.host | default('localhost') }}"
    stack_compose_env_files: "{{ stack.compose_env_files | default([]) }}"

- name: Snapshot guest before risky stack update
  ansible.builtin.include_role:
    name: proxmox_guest_snapshot
  vars:
    snapshot_reason: "stack-update-{{ stack.name }}"
  when:
    - stack.snapshot_before | bool
    - not dry_run | default(false) | bool

- name: Freeze stack update stamp
  ansible.builtin.set_fact:
    stack_update_stamp: "{{ lookup('pipe', 'date +%Y%m%dT%H%M%S') }}"
  when: not dry_run | default(false) | bool

- name: Ensure backup root exists
  ansible.builtin.file:
    path: "{{ backup_root }}"
    state: directory
    mode: '0755'
  delegate_to: localhost
  when:
    - stack.backup_before | bool
    - not dry_run | default(false) | bool

- name: Ensure rollback root exists for stack
  ansible.builtin.file:
    path: "{{ rollback_root }}/{{ stack.name }}"
    state: directory
    mode: '0755'
  delegate_to: localhost
  when: not dry_run | default(false) | bool

- name: Capture rollback metadata before pull
  ansible.builtin.shell: |
    set -euo pipefail
    cd {{ stack_project_dir | quote }}
    python3 - <<'PY'
    import json
    import shutil
    import subprocess
    from datetime import datetime, timezone
    from pathlib import Path

    env_files = {{ stack_compose_env_files | to_json }}
    stack_name = {{ stack.name | to_json }}
    stack_path = {{ stack_project_dir | to_json }}
    use_compose_wrapper = {{ 'True' if stack_execute_host in ['localhost', '127.0.0.1', ''] else 'False' }}

    def compose_cmd(*args: str) -> list[str]:
        wrapper = Path({{ (rackpatch_root ~ '/scripts/compose-wrapper.sh') | to_json }})
        docker_bin = shutil.which("docker")
        docker_compose_bin = shutil.which("docker-compose")
        if use_compose_wrapper and wrapper.exists():
            base = [str(wrapper)]
        elif docker_bin and subprocess.run([docker_bin, "compose", "version"], capture_output=True, text=True, check=False).returncode == 0:
            base = [docker_bin, "compose"]
        elif docker_compose_bin:
            base = [docker_compose_bin]
        else:
            raise SystemExit("docker compose command not available for rollback capture")
        command = base[:]
        for env_file in env_files:
            command.extend(["--env-file", env_file])
        command.extend(args)
        return command

    def run(command: list[str]) -> subprocess.CompletedProcess[str]:
        return subprocess.run(command, cwd=stack_path, text=True, capture_output=True, check=False)

    config_result = run(compose_cmd("config", "--format", "json"))
    if config_result.returncode != 0:
        raise SystemExit(config_result.stderr or config_result.stdout or "compose config failed")
    config = json.loads(config_result.stdout)

    services = []
    for service_name, service_def in config.get("services", {}).items():
        image_ref = service_def.get("image", "")
        container_result = run(compose_cmd("ps", "-q", service_name))
        image_result = run(compose_cmd("images", "-q", service_name))
        services.append(
            {
                "service": service_name,
                "configured_image_ref": image_ref,
                "container_id": container_result.stdout.strip(),
                "image_id": image_result.stdout.strip() if image_result.returncode == 0 else "",
            }
        )

    git_meta = {}
    if (Path(stack_path) / ".git").exists():
        head_result = subprocess.run(["git", "rev-parse", "HEAD"], cwd=stack_path, text=True, capture_output=True, check=False)
        status_result = subprocess.run(
            ["git", "status", "--short"], cwd=stack_path, text=True, capture_output=True, check=False
        )
        git_meta = {
            "head": head_result.stdout.strip() if head_result.returncode == 0 else "",
            "status": status_result.stdout.splitlines() if status_result.returncode == 0 else [],
        }

    payload = {
        "captured_at": datetime.now(timezone.utc).isoformat(),
        "stack_name": stack_name,
        "stack_path": stack_path,
        "env_files": env_files,
        "git": git_meta,
        "services": services,
    }
    print(json.dumps(payload, indent=2, sort_keys=True))
    PY
  args:
    executable: /bin/bash
  register: rollback_capture
  delegate_to: "{{ stack_execute_host }}"
  changed_when: false
  when: not dry_run | default(false) | bool

- name: Save rollback metadata locally
  ansible.builtin.copy:
    content: "{{ rollback_capture.stdout | trim }}\n"
    dest: "{{ rollback_root }}/{{ stack.name }}/{{ stack_update_stamp }}.json"
    mode: '0644'
  delegate_to: localhost
  when: not dry_run | default(false) | bool

- name: Update latest rollback pointer
  ansible.builtin.copy:
    src: "{{ rollback_root }}/{{ stack.name }}/{{ stack_update_stamp }}.json"
    dest: "{{ rollback_root }}/{{ stack.name }}/latest.json"
    remote_src: true
    mode: '0644'
  delegate_to: localhost
  when: not dry_run | default(false) | bool

- name: Emit rollback artifact marker
  ansible.builtin.debug:
    msg: "RACKPATCH_ARTIFACT kind=rollback stack={{ stack.name }} value={{ rollback_root }}/{{ stack.name }}/{{ stack_update_stamp }}.json"
  when: not dry_run | default(false) | bool

- name: Capture stack backup archive when requested
  ansible.builtin.archive:
    path: "{{ stack_project_dir }}"
    dest: "{{ backup_root }}/{{ stack.name }}-{{ stack_update_stamp }}.tgz"
    format: gz
  delegate_to: "{{ stack_execute_host }}"
  when:
    - stack.backup_before | bool
    - not dry_run | default(false) | bool

- name: Emit backup archive artifact marker
  ansible.builtin.debug:
    msg: "RACKPATCH_ARTIFACT kind=backup stack={{ stack.name }} value={{ backup_root }}/{{ stack.name }}-{{ stack_update_stamp }}.tgz"
  when:
    - stack.backup_before | bool
    - not dry_run | default(false) | bool

- name: Run stack-specific backup commands
  ansible.builtin.shell: "{{ backup_command }}"
  args:
    chdir: "{{ stack_project_dir }}"
  environment:
    BACKUP_ROOT: "{{ backup_root }}"
    STACK_UPDATE_STAMP: "{{ stack_update_stamp }}"
  delegate_to: "{{ stack_execute_host }}"
  loop: "{{ stack.backup_commands | default([]) }}"
  loop_control:
    loop_var: backup_command
  changed_when: true
  when:
    - stack.backup_before | bool
    - not dry_run | default(false) | bool

- name: Discover stack-specific backup artifacts
  ansible.builtin.find:
    paths: "{{ backup_root }}"
    patterns: "*{{ stack_update_stamp }}*"
    file_type: file
  register: stack_backup_artifacts
  delegate_to: localhost
  when:
    - stack.backup_before | bool
    - not dry_run | default(false) | bool

- name: Emit stack-specific backup artifact markers
  ansible.builtin.debug:
    msg: "RACKPATCH_ARTIFACT kind=backup stack={{ stack.name }} value={{ item.path }}"
  loop: "{{ stack_backup_artifacts.files | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  when:
    - stack.backup_before | bool
    - not dry_run | default(false) | bool

- name: Validate compose config
  ansible.builtin.shell: |
    set -euo pipefail
    cd {{ stack_project_dir | quote }}
    if docker compose version >/dev/null 2>&1; then
      docker compose{% for env_file in stack_compose_env_files %} --env-file {{ env_file | quote }}{% endfor %} config
    else
      docker-compose{% for env_file in stack_compose_env_files %} --env-file {{ env_file | quote }}{% endfor %} config
    fi
  args:
    executable: /bin/bash
  delegate_to: "{{ stack_execute_host }}"
  changed_when: false

- name: Report dry-run decision for stack
  ansible.builtin.debug:
    msg:
      stack: "{{ stack.name }}"
      host: "{{ stack.host }}"
      dry_run: "{{ dry_run | default(false) | bool }}"
      action: "{{ 'validate-only' if (dry_run | default(false) | bool) else 'apply-update' }}"

- name: Pull images for stack
  ansible.builtin.shell: |
    set -euo pipefail
    cd {{ stack_project_dir | quote }}
    if docker compose version >/dev/null 2>&1; then
      docker compose{% for env_file in stack_compose_env_files %} --env-file {{ env_file | quote }}{% endfor %} pull
    else
      docker-compose{% for env_file in stack_compose_env_files %} --env-file {{ env_file | quote }}{% endfor %} pull
    fi
  args:
    executable: /bin/bash
  delegate_to: "{{ stack_execute_host }}"
  register: stack_pull
  retries: 3
  delay: 15
  until: stack_pull.rc == 0
  when: not dry_run | default(false) | bool

- name: Recreate stack with current desired refs
  ansible.builtin.shell: |
    set -euo pipefail
    cd {{ stack_project_dir | quote }}
    if docker compose version >/dev/null 2>&1; then
      docker compose{% for env_file in stack_compose_env_files %} --env-file {{ env_file | quote }}{% endfor %} up -d
    else
      docker-compose{% for env_file in stack_compose_env_files %} --env-file {{ env_file | quote }}{% endfor %} up -d
    fi
  args:
    executable: /bin/bash
  delegate_to: "{{ stack_execute_host }}"
  when: not dry_run | default(false) | bool

- name: Run post-checks for stack
  ansible.builtin.include_role:
    name: postchecks
  vars:
    postcheck_target: "{{ stack.healthcheck }}"
    postcheck_host: "{{ stack_execute_host }}"
  when: not dry_run | default(false) | bool
