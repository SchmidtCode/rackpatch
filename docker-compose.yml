name: rackpatch

services:
  db:
    image: postgres:17-alpine
    container_name: rackpatch-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: rackpatch
      POSTGRES_USER: rackpatch
      POSTGRES_PASSWORD: ${RACKPATCH_DB_PASSWORD:-change-me}
      TZ: ${TZ:-America/New_York}
    volumes:
      - rackpatch-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rackpatch -d rackpatch"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.rackpatch
    container_name: rackpatch-api
    restart: unless-stopped
    working_dir: /workspace
    depends_on:
      db:
        condition: service_healthy
    command:
      [
        "bash",
        "-lc",
        "uvicorn api.main:app --host 0.0.0.0 --port 9080"
      ]
    environment:
      RACKPATCH_API_HOST: 0.0.0.0
      RACKPATCH_API_PORT: 9080
      RACKPATCH_DB_DSN: postgresql://rackpatch:${RACKPATCH_DB_PASSWORD:-change-me}@db:5432/rackpatch
      RACKPATCH_DATA_ROOT: /data
      RACKPATCH_SITE_NAME: ${RACKPATCH_SITE_NAME:-example}
      RACKPATCH_SITE_ROOT: ${RACKPATCH_SITE_ROOT:-/workspace/sites/example}
      RACKPATCH_ADMIN_USERNAME: ${RACKPATCH_ADMIN_USERNAME:-admin}
      RACKPATCH_ADMIN_PASSWORD: ${RACKPATCH_ADMIN_PASSWORD:-change-me}
      RACKPATCH_AUTH_SECRET: ${RACKPATCH_AUTH_SECRET:-change-me}
      RACKPATCH_AGENT_BOOTSTRAP_TOKEN: ${RACKPATCH_AGENT_BOOTSTRAP_TOKEN:-bootstrap-me}
      RACKPATCH_PUBLIC_BASE_URL: ${RACKPATCH_PUBLIC_BASE_URL:-http://YOUR-RACKPATCH-HOST:3011}
      RACKPATCH_PUBLIC_REPO_URL: ${RACKPATCH_PUBLIC_REPO_URL:-https://github.com/SchmidtCode/rackpatch.git}
      RACKPATCH_PUBLIC_REPO_REF: ${RACKPATCH_PUBLIC_REPO_REF:-main}
      RACKPATCH_PUBLIC_INSTALL_SCRIPT_URL: ${RACKPATCH_PUBLIC_INSTALL_SCRIPT_URL:-}
      RACKPATCH_PUBLIC_AGENT_COMPOSE_DIR: ${RACKPATCH_PUBLIC_AGENT_COMPOSE_DIR:-/srv/compose/rackpatch-agent}
      RACKPATCH_PUBLIC_RACKPATCH_COMPOSE_DIR: ${RACKPATCH_PUBLIC_RACKPATCH_COMPOSE_DIR:-/srv/compose/rackpatch}
      RACKPATCH_CORS_ORIGINS: ${RACKPATCH_CORS_ORIGINS:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_IDS: ${TELEGRAM_CHAT_IDS:-}
      ANSIBLE_CONFIG: /workspace/ansible.cfg
      TZ: ${TZ:-America/New_York}
    volumes:
      - .:/workspace
      - ./data:/data
      - ${RACKPATCH_COMPOSE_ROOT:-/srv/compose}:${RACKPATCH_COMPOSE_ROOT:-/srv/compose}
      - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - "9080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9080/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile.rackpatch
    container_name: rackpatch-worker
    restart: unless-stopped
    working_dir: /workspace
    depends_on:
      db:
        condition: service_healthy
    command:
      [
        "bash",
        "-lc",
        "python3 -m worker.main"
      ]
    environment:
      RACKPATCH_DB_DSN: postgresql://rackpatch:${RACKPATCH_DB_PASSWORD:-change-me}@db:5432/rackpatch
      RACKPATCH_DATA_ROOT: /data
      RACKPATCH_SITE_NAME: ${RACKPATCH_SITE_NAME:-example}
      RACKPATCH_SITE_ROOT: ${RACKPATCH_SITE_ROOT:-/workspace/sites/example}
      RACKPATCH_ADMIN_USERNAME: ${RACKPATCH_ADMIN_USERNAME:-admin}
      RACKPATCH_ADMIN_PASSWORD: ${RACKPATCH_ADMIN_PASSWORD:-change-me}
      RACKPATCH_AUTH_SECRET: ${RACKPATCH_AUTH_SECRET:-change-me}
      RACKPATCH_AGENT_BOOTSTRAP_TOKEN: ${RACKPATCH_AGENT_BOOTSTRAP_TOKEN:-bootstrap-me}
      RACKPATCH_PUBLIC_BASE_URL: ${RACKPATCH_PUBLIC_BASE_URL:-http://YOUR-RACKPATCH-HOST:3011}
      RACKPATCH_PUBLIC_REPO_URL: ${RACKPATCH_PUBLIC_REPO_URL:-https://github.com/SchmidtCode/rackpatch.git}
      RACKPATCH_PUBLIC_REPO_REF: ${RACKPATCH_PUBLIC_REPO_REF:-main}
      RACKPATCH_PUBLIC_INSTALL_SCRIPT_URL: ${RACKPATCH_PUBLIC_INSTALL_SCRIPT_URL:-}
      RACKPATCH_PUBLIC_AGENT_COMPOSE_DIR: ${RACKPATCH_PUBLIC_AGENT_COMPOSE_DIR:-/srv/compose/rackpatch-agent}
      RACKPATCH_PUBLIC_RACKPATCH_COMPOSE_DIR: ${RACKPATCH_PUBLIC_RACKPATCH_COMPOSE_DIR:-/srv/compose/rackpatch}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_IDS: ${TELEGRAM_CHAT_IDS:-}
      ANSIBLE_CONFIG: /workspace/ansible.cfg
      TZ: ${TZ:-America/New_York}
    volumes:
      - .:/workspace
      - ./data:/data
      - ${RACKPATCH_COMPOSE_ROOT:-/srv/compose}:${RACKPATCH_COMPOSE_ROOT:-/srv/compose}
      - /var/run/docker.sock:/var/run/docker.sock

  agent:
    profiles: ["self-agent"]
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: rackpatch-self-agent
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      RACKPATCH_SERVER_URL: http://api:9080
      RACKPATCH_AGENT_BOOTSTRAP_TOKEN: ${RACKPATCH_SELF_AGENT_BOOTSTRAP_TOKEN:-}
      RACKPATCH_AGENT_NAME: ${RACKPATCH_SELF_AGENT_NAME:-}
      RACKPATCH_AGENT_DISPLAY_NAME: ${RACKPATCH_SELF_AGENT_DISPLAY_NAME:-}
      RACKPATCH_AGENT_LABELS: ${RACKPATCH_SELF_AGENT_LABELS:-control-plane,self-agent}
      RACKPATCH_AGENT_MODE: compose
      RACKPATCH_AGENT_COMPOSE_DIR: ${RACKPATCH_PUBLIC_RACKPATCH_COMPOSE_DIR:-/srv/compose/rackpatch}
      RACKPATCH_AGENT_STATE_DIR: /var/lib/rackpatch-agent
      RACKPATCH_HOST_HELPER_SOCKET: ${RACKPATCH_SELF_AGENT_HELPER_SOCKET:-/run/rackpatch-host-helper/rackpatch-host-helper.sock}
    volumes:
      - ./data/self-agent:/var/lib/rackpatch-agent
      - /var/run/docker.sock:/var/run/docker.sock
      - /run/rackpatch-host-helper:/run/rackpatch-host-helper

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: rackpatch-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${RACKPATCH_HTTP_PORT:-3011}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  telegram:
    build:
      context: .
      dockerfile: Dockerfile.rackpatch
    container_name: rackpatch-telegram
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    command: ["python3", "-m", "telegrambot.main"]
    environment:
      RACKPATCH_API_BASE: http://api:9080
      RACKPATCH_DB_DSN: postgresql://rackpatch:${RACKPATCH_DB_PASSWORD:-change-me}@db:5432/rackpatch
      RACKPATCH_DATA_ROOT: /data
      RACKPATCH_SITE_NAME: ${RACKPATCH_SITE_NAME:-example}
      RACKPATCH_SITE_ROOT: ${RACKPATCH_SITE_ROOT:-/workspace/sites/example}
      RACKPATCH_ADMIN_USERNAME: ${RACKPATCH_ADMIN_USERNAME:-admin}
      RACKPATCH_ADMIN_PASSWORD: ${RACKPATCH_ADMIN_PASSWORD:-change-me}
      RACKPATCH_AUTH_SECRET: ${RACKPATCH_AUTH_SECRET:-change-me}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_IDS: ${TELEGRAM_CHAT_IDS:-}
      TZ: ${TZ:-America/New_York}
    volumes:
      - .:/workspace
      - ./data:/data

  notify:
    build:
      context: .
      dockerfile: Dockerfile.rackpatch
    container_name: rackpatch-notify
    restart: unless-stopped
    profiles: ["notify"]
    depends_on:
      api:
        condition: service_healthy
    command: ["uvicorn", "notify.main:app", "--host", "0.0.0.0", "--port", "9091"]
    environment:
      RACKPATCH_NOTIFY_PORT: 9091
      RACKPATCH_DB_DSN: postgresql://rackpatch:${RACKPATCH_DB_PASSWORD:-change-me}@db:5432/rackpatch
      RACKPATCH_AUTH_SECRET: ${RACKPATCH_AUTH_SECRET:-change-me}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_IDS: ${TELEGRAM_CHAT_IDS:-}
      TZ: ${TZ:-America/New_York}
    expose:
      - "9091"
    ports:
      - "${RACKPATCH_NOTIFY_PORT:-9091}:9091"

networks:
  default:
    name: rackpatch-network

volumes:
  rackpatch-db-data:
    name: ${RACKPATCH_DB_VOLUME:-rackpatch-db-data}
    external: ${RACKPATCH_DB_VOLUME_EXTERNAL:-false}
